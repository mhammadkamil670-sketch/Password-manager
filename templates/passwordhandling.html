
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Password handler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      #createcon {
       display:none;
      }
      #container{
        display:block;
      }
    </style>
  </head>
<body>
  <div id="createcon" class="bg-gray-400 h-screen w-screen ">
    <div id="cre" class="bg-white mx-auto my-auto h-1/2 w-3/4 flex flex-col border-2 border-black rounded-xl items-flex gap-4">
    <input id="titleinp" class="border border-black rounded relative mt-4 w-5/6 mx-auto p-1"type="text" placeholder="Enter the title of the password">
    <input id="passinp" class=" border border-black rounded relative mt-4 w-5/6 mx-auto p-1" type="text" id="passlength" placeholder="Enter the password's length">
    <button id="generate" class="text-green-500">Generate</button>
    <button id="close" class="text-red-500">Close</button>
      <p id="feedback" class="text-red-500"></p>
    </div>
  </div>
  <div id="container" class="h-screen" class="bg-gray-300 flex flex-col gap-5">
    {% for passwordt in passwords %}
    <div id="{{loop.index}}" class="h-[15%] w-[90%]  border border-black rounded-lg mx-auto flex flex-col shadow-lg gap-2">
      <div id="contid" class="flex m-0">
      <p id="idforpass"><strong>{{passwordt[2]}}</strong></p>
      <h1 id="header{{loop.index}}">{{passwordt[0]}}</h1>
      </div>
    <div id="contpas" class="flex gap-2">
      <p id="pass{{loop.index}}">Password:</p>
      <p id="pass2{{loopindex}}">{{passwordt[1]}}</p>
   <button class="show  w-[15%] bg-transparent px-1 text-black rounded hover-bg-gray-300" data-index="{{loop.index}}">Show</button>
    </div>
    <button class="delete relative text-red-500 mr-2 ml-auto bottom-1" data-index="{{loop.index}}">Delete</button>      
  </div>
{% endfor %}
  </div>
  <button id="addbt" class="fixed bottom-2 right-2 border border-black rounded-3xl p-[5%] bg-yellow-300 text-[75%]">+</button>
<script>
  const con=document.getElementById("createcon")
  const addbtn=document.getElementById("add")
async function postreq(mess){
  const response=await fetch("/passwords",{
    method:"POST",
    headers: {'Content-Type':'application/json'},
     body: JSON.stringify({message:mess})
  })
  if (!response.ok){
    return none
  }
 const data=await response.json()
  if (data.login ===false){
 window.location.href="/next2"}
  return data.message  
}  

function createbox(pass, tit, idVal) {
  const box = document.createElement("div");
  box.className = "h-[15%] w-[90%] border border-black rounded-lg mx-auto flex flex-col shadow-lg gap-2";

  // TOP ROW (ID + TITLE)
  const topDiv = document.createElement("div");
  topDiv.className = "flex m-0";

  const idp = document.createElement("p");
  idp.innerHTML = "<strong>" + idVal + "</strong>";

  const header = document.createElement("h1");
  header.textContent = tit;

  topDiv.append(idp, header);

  // PASSWORD ROW
  const passDiv = document.createElement("div");
  passDiv.className = "flex gap-2";

  const passLabel = document.createElement("p");
  passLabel.textContent = "Password:";

  const passValue = document.createElement("p");
  passValue.textContent = pass;
  passValue.style.webkitTextSecurity = "disc";

  // SHOW BUTTON
  const showBtn = document.createElement("button");
  showBtn.textContent = "Show";
  showBtn.className = "w-[15%] bg-transparent px-1 text-black rounded hover:bg-gray-300";

  let hidden = true;
  showBtn.addEventListener("click", () => {
    if (hidden) {
      passValue.style.webkitTextSecurity = "none";
      showBtn.textContent = "Hide";
    } else {
      passValue.style.webkitTextSecurity = "disc";
      showBtn.textContent = "Show";
    }
    hidden = !hidden;
  });

  passDiv.append(passLabel, passValue, showBtn);

  // DELETE BUTTON
  const delBtn = document.createElement("button");
  delBtn.textContent = "Delete";
  delBtn.className = "delete text-red-500 mr-2 ml-auto";

  delBtn.addEventListener("click", function () {
    passValue.style.webkitTextSecurity = "none";
    const message = "delete " + idVal;
    passValue.style.webkitTextSecurity = "disc";

    postreq(message).then(result => {
      if (!result) {
        alert("An error occured please try again");
      } else {
        box.remove();
      }
      alert(result);
    });
  });

  // APPEND EVERYTHING
  box.append(topDiv, passDiv, delBtn);
  document.getElementById("container").appendChild(box);
}
  const pbtn=document.getElementById("addbt") 
  pbtn.addEventListener("click",()=>{
document.getElementById("createcon").style.display="flex"
  document.getElementById("container").style.display="none"
    pbtn.style.display="none"
  })
  const closebtn= document.getElementById("close")
closebtn.addEventListener("click",()=>{
document.getElementById("createcon").style.display="none"  
  document.getElementById("container").style.display="block"
  pbtn.style.display="block"
  })
const gbtn=document.getElementById("generate")
  gbtn.addEventListener("click",()=>{
    const pasin=document.getElementById("passinp")
    passtit=document.getElementById("titleinp")
    
    let passlen=pasin.value
    let pastit=passtit.value
   if (!pastit || !passlen){
     document.getElementById("feedback").innerText="please fill in both fields"
    }
   else if (8>=passlen || passlen>=30 || isNaN(passlen) ){
      document.getElementById("feedback").innerText="password's length should be within the numbers from 8 to 30"
    }
   else if (pastit.length>30){
     document.getElementById("feedback").innerText="Title should not exceed 30 characters"
   }
  else{
    let message="generate"+" "+passlen+" "+pastit
    postreq(message).then(result=>{
  if (!result){
    alert("An error occured please try again")
  } 
createbox(result.pass,result.tit,result.idval)
      
    })  
document.getElementById("createcon").style.display="none"
    document.getElementById("container").style.display="block"
    pbtn.style.display="block"
  }
  })
document.querySelectorAll(".delete").forEach(button =>{
    button.addEventListener("click",function(){
    const parent= this.parentElement
parent.children[1].children[1].style.WebkitTextSecurity="none"  
    const message="delete"+" "+parent.children[0].children[0].innerText
parent.children[1].children[1].style.WebkitTextSecurity="disc"   
    postreq(message).then(result=>{
      if (!result){
     alert("An error occured please try again")
      }
    else{
    this.parentElement.remove()
    }
      alert(result)
    })
    })
  })
document.querySelectorAll(".show").forEach(button=>{
  button.textContent="show"
  let hidden=true
  button.addEventListener("click",()=>{
    let parent=button.parentElement
    if (hidden){
      button.textContent="hide"
      parent.children[1].style.webkitTextSecurity="none"
      hidden=!hidden
    }
   else{
      button.textContent="show"
      parent.children[1].style.webkitTextSecurity="disc"
      hidden=!hidden
   }
  })
})                       
</script>  
</body>  
</html>
